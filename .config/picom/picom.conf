# Бэкенд для работы с графикой.
backend = "glx";

# Вертикальная синхронизация. Убирает разрывы изображения.
vsync = true;

# ------ Эффекты и оформление ------

# Настройка теней для окон
shadow = true;
shadow-radius = 12;        # Радиус размытия тени
shadow-opacity = 0.5;      # Прозрачность тени
shadow-offset-x = -7;      # Смещение тени по горизонтали
shadow-offset-y = -7;      # Смещение тени по вертикали

# Скругление углов окон
rounded-corners = true;
corner-radius = 10.0;

# Плавное появление и закрытие окон (Fading)
fading = true;
fade-in-step = 0.03;       # Скорость появления
fade-out-step = 0.03;      # Скорость исчезновения

# Прозрачность для неактивных окон
inactive-opacity = 0.9;    # 0 = полностью прозрачное, 1 = непрозрачное
active-opacity = 1.0;      # Активное окно всегда непрозрачное

# Настройки размытия фона
blur-background = true;
blur-method = "dual_kawase";  # Метод размытия: kawase или gaussian
blur-size = 8;             # Сила размытия
blur-deviation = 5.0;

# ------ Производительность ------

# Позволяет временно отключать композитинг для полноэкранных приложений (игры).
unredir-if-possible = true;

# Исключения для размытия и теней (чтобы не накладывать эффекты на панели, доки и т.д.)
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

shadow-exclude = [
  "class_g = 'Polybar'"
];

